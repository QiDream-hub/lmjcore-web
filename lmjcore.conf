# ===========================================
# LMJCore-Web 配置文件
# ===========================================
# 此文件用于配置 LMJCore HTTP 服务器的运行参数
# 注释可以使用 # 或 ; 开头
# ===========================================

# ----------------------------
# 网络配置
# ----------------------------

# 监听地址 (默认：0.0.0.0)
# 可选值：0.0.0.0 (所有接口), 127.0.0.1 (仅本地), 或具体 IP
host = 0.0.0.0

# 监听端口 (默认：8080)
port = 8080

# ----------------------------
# 数据库配置
# ----------------------------

# LMDB 数据库存储路径 (默认：./lmjcore_data)
db_path = ./lmjcore_data

# 内存映射大小 (默认：10MB)
# 支持后缀：K (千字节), M (兆字节), G (吉字节)
# 例如：10M = 10MB, 1G = 1GB
map_size = 10M

# ----------------------------
# 连接配置
# ----------------------------

# 最大并发连接数 (默认：128)
max_connections = 128

# 事务超时时间 (秒) (默认：5 秒)
# 超过此时间的事务将自动回滚
txn_timeout = 5

# ----------------------------
# 运行模式配置
# ----------------------------

# 是否以守护进程模式运行 (默认：false)
# 可选值：true/false, yes/no, on/off, 1/0
daemon = false

# 日志级别 (默认：1)
# 0 = DEBUG (详细调试信息)
# 1 = INFO  (一般信息)
# 2 = WARN  (警告信息)
# 3 = ERROR (仅错误信息)
log_level = 1
